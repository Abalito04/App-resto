<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Restó App</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
    <meta name="theme-color" content="#000000">
    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
    <meta name="theme-color" content="#f3b927">

</head>

<body>
    <header>
        <h1>🍽️ Restó App</h1>
       <nav class="navbar navbar-expand-lg navbar-light bg-light">
  <div class="container-fluid">
    <a class="navbar-brand" href="{{ url_for('index') }}">Mozo</a>
    <a class="navbar-brand" href="{{ url_for('cocina') }}">Cocina</a>
    <a class="navbar-brand" href="{{ url_for('historial') }}">Historial</a>
  </div>
</nav>

    </header>
    <main>
        {% block content %}{% endblock %}
    </main>
<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("/static/service-worker.js")
    .then(() => console.log("✅ Service Worker registrado"))
    .catch(err => console.error("SW fail", err));
}
</script>
<script>
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("/static/sw.js").then(reg => {
      console.log("ServiceWorker registrado:", reg);
    }).catch(err => console.log("ServiceWorker error:", err));
  });
}
</script>

</body>
</html>
